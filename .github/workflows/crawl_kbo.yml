name: KBO 2026 크롤러

on:
  schedule:
    - cron: '0 13 * * *'  # 매일 오후 10시 KST (UTC 00:00 = KST 09:00)
    - cron: '0 14 * * *'  # 매일 오후 11시 KST (UTC 00:00 = KST 09:00)
    - cron: '0 21 * * *'  # 매일 오전 6시 KST (UTC 21:00 = KST 06:00)
  workflow_dispatch:       # GitHub 웹에서 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 크롤러 실행
        run: python3 crawl_2026.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add 2026.csv
          git diff --cached --quiet && echo "변경 없음" || (
            git commit -m "chore: 2026.csv 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
            git push
          )
